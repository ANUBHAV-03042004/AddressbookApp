spring.application.name=AddressbookApp

# -------------------------------------------------------
# AWS RDS MySQL - port 3307 (ISP blocks 3306)
# -------------------------------------------------------
spring.datasource.url={SPRING_DATASOURCE_URL}
spring.datasource.username={SPRING_DATASOURCE_USERNAME}
spring.datasource.password={SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------
# Server port
# Elastic Beanstalk reverse proxy forwards to port 5000
# -------------------------------------------------------
server.port=5000

# -------------------------------------------------------
# Swagger UI
# app.server-url is the public Beanstalk URL
# Change this to your actual Beanstalk environment URL
# -------------------------------------------------------
app.server-url=http://addressbook.us-east-1.elasticbeanstalk.com

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
