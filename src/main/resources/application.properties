spring.application.name=AddressbookApp

# -------------------------------------------------------
# AWS RDS MySQL
# Elastic Beanstalk substitutes {VAR} placeholders (no $)
# -------------------------------------------------------
spring.datasource.url={SPRING_DATASOURCE_URL}
spring.datasource.username={SPRING_DATASOURCE_USERNAME}
spring.datasource.password={SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------
# Server port — EB nginx forwards to 5000
# -------------------------------------------------------
server.port=5000

# -------------------------------------------------------
# Swagger / SpringDoc
# -------------------------------------------------------
app.server-url=http://addressbook.us-east-1.elasticbeanstalk.com
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# -------------------------------------------------------
# JWT — using same {VAR} style as your other EB properties
# -------------------------------------------------------
app.jwt.secret=dGhpcy1pcy1hLXZlcnktc3Ryb25nLWp3dC1zZWNyZXQta2V5LWZvci1hZGRyZXNzYm9vay1hcHAta2VlcC1pdC1zYWZl
