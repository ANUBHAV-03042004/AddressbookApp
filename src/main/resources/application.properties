spring.application.name=AddressbookApp

# -------------------------------------------------------
# AWS RDS MySQL - port 3307 (ISP blocks 3306)
# -------------------------------------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

server.port=${SERVER_PORT:5000}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------------------------------------
# JPA / Hibernate
# -------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------
# Swagger / SpringDoc
# -------------------------------------------------------
app.server-url=http://addressbook.us-east-1.elasticbeanstalk.com
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Allow Swagger UI to send Bearer tokens via the Authorize button
springdoc.swagger-ui.oauth2-redirect-url=/swagger-ui/oauth2-redirect.html

